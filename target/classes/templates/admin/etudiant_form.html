<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Formulaire Étudiant')}"></head>
<body>

<div class="app-container">
    <div th:replace="~{fragments :: sidebar('etudiants', 'ROLE_ADMIN')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: navbar(${username}, 'ROLE_ADMIN')}"></div>

        <div class="content-wrapper animated-fade-in" style="max-width: 800px; margin: 0 auto;">
            <div class="glass-card p-4">
                <div class="d-flex align-items-center gap-2 mb-4">
                    <a href="/admin/etudiants" class="btn btn-sm btn-outline-secondary" style="border-radius: 8px;"><i class="fa-solid fa-arrow-left"></i> Retour</a>
                    <h3 class="fw-bold mb-0" th:text="${etudiantForm.id == null ? 'Nouvel Étudiant' : 'Modifier Étudiant'}">Formulaire Étudiant</h3>
                </div>

                <form th:action="@{/admin/etudiants/sauver}" method="post" th:object="${etudiantForm}">
                    <input type="hidden" th:field="*{id}">

                    <div class="row">
                        <!-- Matricule -->
                        <div class="col-md-6 form-group-custom">
                            <label for="matricule">Matricule Étudiant</label>
                            <input type="text" id="matricule" th:field="*{matricule}" class="form-control-custom" placeholder="Ex: C28916" th:readonly="${etudiantForm.id != null}" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('matricule')}" th:errors="*{matricule}">Erreur</div>
                        </div>

                        <!-- Email -->
                        <div class="col-md-6 form-group-custom">
                            <label for="email">Adresse E-mail</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control-custom" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Erreur</div>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Nom -->
                        <div class="col-md-6 form-group-custom">
                            <label for="nom">Nom</label>
                            <input type="text" id="nom" th:field="*{nom}" class="form-control-custom" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}">Erreur</div>
                        </div>

                        <!-- Prénom -->
                        <div class="col-md-6 form-group-custom">
                            <label for="prenom">Prénom</label>
                            <input type="text" id="prenom" th:field="*{prenom}" class="form-control-custom" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}">Erreur</div>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Date Naissance -->
                        <div class="col-md-6 form-group-custom">
                            <label for="dateNaissance">Date de Naissance</label>
                            <input type="date" id="dateNaissance" th:field="*{dateNaissance}" class="form-control-custom" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dateNaissance')}" th:errors="*{dateNaissance}">Erreur</div>
                        </div>

                        <!-- Téléphone -->
                        <div class="col-md-6 form-group-custom">
                            <label for="telephone">Téléphone</label>
                            <input type="text" id="telephone" th:field="*{telephone}" class="form-control-custom">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}">Erreur</div>
                        </div>
                    </div>

                    <!-- Adresse -->
                    <div class="form-group-custom">
                        <label for="adresse">Adresse Résidentielle</label>
                        <textarea id="adresse" th:field="*{adresse}" class="form-control-custom" rows="2"></textarea>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('adresse')}" th:errors="*{adresse}">Erreur</div>
                    </div>

                    <div class="row">
                        <!-- Niveau -->
                        <div class="col-md-6 form-group-custom">
                            <label for="niveau">Niveau Académique</label>
                            <select id="niveau" th:field="*{niveau}" class="form-control-custom" required>
                                <option value="L1">L1 (Licence 1)</option>
                                <option value="L2">L2 (Licence 2)</option>
                                <option value="L3">L3 (Licence 3)</option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('niveau')}" th:errors="*{niveau}">Erreur</div>
                        </div>

                        <!-- Filière -->
                        <div class="col-md-6 form-group-custom">
                            <label for="filiere">Filière</label>
                            <select id="filiere" th:field="*{filiereId}" class="form-control-custom">
                                <option value="">Choisir une filière...</option>
                                <option th:each="f : ${filieres}" th:value="${f.id}" th:text="${f.code} + ' - ' + ${f.nom}">Filiere</option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('filiereId')}" th:errors="*{filiereId}">Erreur</div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary-custom w-100 py-2" style="font-weight: 600;">Enregistrer l'Étudiant</button>
                        <a href="/admin/etudiants" class="btn btn-outline-secondary w-100 py-2" style="border-radius: 8px;">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer()}"></div>
</body>
</html>
