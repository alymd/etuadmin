<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Gestion des Filières')}"></head>
<body>

<div class="app-container">
    <div th:replace="~{fragments :: sidebar('filieres', 'ROLE_ADMIN')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: navbar(${username}, 'ROLE_ADMIN')}"></div>

        <div class="content-wrapper animated-fade-in">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius: 8px;">
                <span th:text="${success}">Succès !</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius: 8px;">
                <span th:text="${error}">Erreur !</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="row g-4">
                <!-- Liste des filières -->
                <div class="col-lg-8">
                    <div class="glass-card p-4">
                        <h5 class="fw-bold mb-3">Liste des Filières</h5>
                        <div class="table-custom-wrapper">
                            <table class="table-custom">
                                <thead>
                                    <tr>
                                        <th>Code</th>
                                        <th>Nom Complet</th>
                                        <th>Capacité Max</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="f : ${filieres}">
                                        <td class="fw-bold text-primary" th:text="${f.code}">Code</td>
                                        <td th:text="${f.nom}">Nom de la filiere</td>
                                        <td>
                                            <span class="badge bg-secondary badge-custom" th:text="${f.capaciteMax} + ' places'">Capacité</span>
                                        </td>
                                        <td>
                                            <button class="btn btn-sm btn-outline-dark me-1" 
                                                    th:data-filiere-id="${f.id}"
                                                    th:data-filiere-code="${f.code}"
                                                    th:data-filiere-nom="${f.nom}"
                                                    th:data-filiere-capacite="${f.capaciteMax}"
                                                    onclick="const btn = event.target.closest('button'); chargerFiliere(btn.dataset.filiereId, btn.dataset.filiereCode, btn.dataset.filiereNom, btn.dataset.filiereCapacite)" 
                                                    style="border-radius: 6px;"><i class="fa-solid fa-edit"></i></button>
                                            <a th:href="@{/admin/filieres/supprimer/{id}(id=${f.id})}" class="btn btn-sm btn-outline-danger"
                                               th:attr="onclick=|return confirm('Supprimer la filiere ${f.code} ?');|"><i class="fa-solid fa-trash"></i></a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Formulaire d'ajout/modification -->
                <div class="col-lg-4">
                    <div class="glass-card p-4">
                        <h5 class="fw-bold mb-3" id="form-title">Ajouter une Filière</h5>
                        <form th:action="@{/admin/filieres/sauver}" method="post" th:object="${nouvelleFiliere}">
                            <input type="hidden" id="edit-id" name="id">

                            <div class="form-group-custom">
                                <label for="code">Code de la Filière</label>
                                <input type="text" id="code" name="code" class="form-control-custom" placeholder="Ex: MIAGE, DA2I, PC..." required>
                            </div>

                            <div class="form-group-custom">
                                <label for="nom">Nom de la Filière</label>
                                <input type="text" id="nom" name="nom" class="form-control-custom" placeholder="Nom complet..." required>
                            </div>

                            <div class="form-group-custom">
                                <label for="capaciteMax">Capacité Maximale</label>
                                <input type="number" id="capaciteMax" name="capaciteMax" class="form-control-custom" min="1" max="1000" required>
                            </div>

                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary-custom w-100">Enregistrer</button>
                                <button type="button" class="btn btn-outline-secondary w-100" onclick="annulerEdit()" style="border-radius: 8px;">Annuler</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer()}"></div>
<script>
    function chargerFiliere(id, code, nom, capaciteMax) {
        document.getElementById('form-title').innerText = "Modifier la Filière";
        document.getElementById('edit-id').value = id;
        document.getElementById('code').value = code;
        document.getElementById('nom').value = nom;
        document.getElementById('capaciteMax').value = capaciteMax;
    }

    function annulerEdit() {
        document.getElementById('form-title').innerText = "Ajouter une Filière";
        document.getElementById('edit-id').value = "";
        document.getElementById('code').value = "";
        document.getElementById('nom').value = "";
        document.getElementById('capaciteMax').value = "";
    }
</script>
</body>
</html>
