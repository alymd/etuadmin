<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Gestion des Étudiants - Scolarité')}"></head>
<body>

<div class="app-container">
    <div th:replace="~{fragments :: sidebar('scolarite', 'ROLE_SCOLARITE')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: navbar(${username}, 'ROLE_SCOLARITE')}"></div>

        <div class="content-wrapper animated-fade-in">
            <div th:replace="~{fragments :: recherche-etudiants('/scolarite/etudiants')}"></div>

            <div class="glass-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0">Liste des Étudiants</h5>
                    <a href="/scolarite/inscriptions" class="btn btn-primary-custom btn-sm">Inscriptions</a>
                </div>
                <div class="table-custom-wrapper">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Matricule</th>
                                <th>Nom complet</th>
                                <th>E-mail</th>
                                <th>Promotion</th>
                                <th>Filière</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="etudiant : ${etudiants}">
                                <td class="fw-semibold text-primary" th:text="${etudiant.matricule}">C00000</td>
                                <td th:text="${etudiant.utilisateur.prenom} + ' ' + ${etudiant.utilisateur.nom}">Nom</td>
                                <td th:text="${etudiant.utilisateur.email}">email</td>
                                <td><span class="badge bg-secondary badge-custom" th:text="${etudiant.niveau}">L1</span></td>
                                <td th:text="${etudiant.filiereActuelle != null ? etudiant.filiereActuelle.nom : 'Non orienté'}">Filière</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(etudiants)}">
                                <td colspan="5" class="text-center text-muted py-3">Aucun étudiant trouvé.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer()}"></div>
</body>
</html>
