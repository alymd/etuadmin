<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Inscriptions Étudiantes')}"></head>
<body>

<div class="app-container">
    <div th:replace="~{fragments :: sidebar('inscriptions', 'ROLE_SCOLARITE')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: navbar(${username}, 'ROLE_SCOLARITE')}"></div>

        <div class="content-wrapper animated-fade-in">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius: 8px;">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius: 8px;">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="glass-card p-4 mb-4">
                <h5 class="fw-bold mb-3">Nouvelle inscription</h5>
                <form th:action="@{/scolarite/inscriptions/sauver}" method="post" class="row g-3 mb-4">
                    <div class="col-md-5 form-group-custom">
                        <label for="etudiantId">Étudiant</label>
                        <select id="etudiantId" name="etudiantId" class="form-control-custom" required>
                            <option value="">Sélectionner...</option>
                            <option th:each="etudiant : ${etudiants}" th:value="${etudiant.id}" th:text="${etudiant.matricule} + ' - ' + ${etudiant.utilisateur.prenom} + ' ' + ${etudiant.utilisateur.nom}">Étudiant</option>
                        </select>
                    </div>
                    <div class="col-md-5 form-group-custom">
                        <label for="semestreId">Semestre</label>
                        <select id="semestreId" name="semestreId" class="form-control-custom" required>
                            <option value="">Sélectionner...</option>
                            <option th:each="semestre : ${semestres}" th:value="${semestre.id}" th:text="${semestre.code} + ' - ' + ${semestre.anneeUniversitaire.libelle}">Semestre</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary-custom w-100">Inscrire</button>
                    </div>
                </form>

                <form method="get" th:action="@{/scolarite/inscriptions}" class="row g-2 align-items-end mb-3">
                    <div class="col-md-4">
                        <label class="small text-muted">Filtrer par année</label>
                        <select name="anneeId" class="form-select form-select-sm">
                            <option value="">Toutes les années</option>
                            <option th:each="a : ${annees}" th:value="${a.id}" th:text="${a.libelle}" th:selected="${anneeId != null and a.id == anneeId}">Année</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-outline-primary btn-sm">Filtrer</button>
                    </div>
                </form>

                <div class="table-custom-wrapper">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Matricule</th>
                                <th>Étudiant</th>
                                <th>Semestre</th>
                                <th>Année</th>
                                <th>Moyenne</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="inscription : ${inscriptions}">
                                <td class="fw-semibold text-primary" th:text="${inscription.etudiant.matricule}">C00000</td>
                                <td th:text="${inscription.etudiant.utilisateur.prenom} + ' ' + ${inscription.etudiant.utilisateur.nom}">Nom</td>
                                <td th:text="${inscription.semestre.code}">S1</td>
                                <td th:text="${inscription.anneeUniversitaire.libelle}">Année</td>
                                <td th:text="${inscription.moyenneSemestre != null ? inscription.moyenneSemestre : '-'}">-</td>
                                <td th:text="${inscription.valide ? 'Validée' : 'En attente'}">Statut</td>
                                <td>
                                    <a th:href="@{/scolarite/inscriptions/supprimer/{id}(id=${inscription.id})}" class="btn btn-sm btn-outline-danger"
                                       th:attr="onclick=|return confirm('Supprimer cette inscription ?');|"><i class="fa-solid fa-trash"></i></a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(inscriptions)}">
                                <td colspan="7" class="text-center text-muted py-3">Aucune inscription trouvée.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer()}"></div>
</body>
</html>
