<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Saisie des Notes')}"></head>
<body>

<div class="app-container">
    <div th:replace="~{fragments :: sidebar('scolarite', 'ROLE_SCOLARITE')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: navbar(${username}, 'ROLE_SCOLARITE')}"></div>

        <div class="content-wrapper animated-fade-in">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert" style="border-radius: 8px;">
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert" style="border-radius: 8px;">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="glass-card p-4 mb-4">
                <h6 class="fw-bold mb-3">Navigation par semestre et module</h6>
                <form method="get" th:action="@{/scolarite/notes}" class="row g-3 align-items-end">
                    <div class="col-md-3 form-group-custom">
                        <label for="semestreId">Semestre</label>
                        <select id="semestreId" name="semestreId" class="form-control-custom" onchange="this.form.submit()">
                            <option value="">Choisir un semestre...</option>
                            <option th:each="sem : ${semestres}" th:value="${sem.id}" th:text="${sem.code} + ' - ' + ${sem.anneeUniversitaire.libelle}" th:selected="${sem.id == semestreIdSelected}">Semestre</option>
                        </select>
                    </div>
                    <div class="col-md-4 form-group-custom">
                        <label for="moduleId">Module</label>
                        <select id="moduleId" name="moduleId" class="form-control-custom" onchange="this.form.submit()">
                            <option value="">Choisir un module...</option>
                            <option th:each="m : ${modules}" th:value="${m.id}" th:text="${m.code} + ' - ' + ${m.nom}" th:selected="${m.id == moduleIdSelected}">Module</option>
                        </select>
                    </div>
                    <div class="col-md-4 form-group-custom">
                        <label for="matiereId">Matière</label>
                        <select id="matiereId" name="matiereId" class="form-control-custom">
                            <option value="">Choisir une matière...</option>
                            <option th:each="matiere : ${matieres}" th:value="${matiere.id}" th:text="${matiere.code} + ' - ' + ${matiere.nom}" th:selected="${matiere.id == matiereIdSelected}">Matière</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-primary-custom w-100">OK</button>
                    </div>
                </form>
            </div>

            <div th:if="${matiereSelected != null}" class="glass-card p-4">
                <h5 class="fw-bold mb-1" th:text="'Saisie : ' + ${matiereSelected.code} + ' - ' + ${matiereSelected.nom}">Saisie</h5>
                <p class="text-muted small mb-3" th:if="${moduleSelected != null}" th:text="'Module : ' + ${moduleSelected.code} + ' - ' + ${moduleSelected.nom}">Module</p>
                <div class="table-custom-wrapper">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>Matricule</th>
                                <th>Étudiant</th>
                                <th>CC</th>
                                <th>TP</th>
                                <th>Examen</th>
                                <th>Rattrapage</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="note : ${notesEtudiants}">
                                <form th:action="@{/scolarite/notes/enregistrer}" method="post">
                                    <input type="hidden" name="inscriptionId" th:value="${note.inscription.id}">
                                    <input type="hidden" name="matiereId" th:value="${note.matiere.id}">
                                    <td th:text="${note.inscription.etudiant.matricule}">C00000</td>
                                    <td th:text="${note.inscription.etudiant.utilisateur.prenom} + ' ' + ${note.inscription.etudiant.utilisateur.nom}">Nom</td>
                                    <td><input type="number" name="noteCC" min="0" max="20" step="0.01" class="form-control-custom" th:value="${note.noteCC}"></td>
                                    <td><input type="number" name="noteTP" min="0" max="20" step="0.01" class="form-control-custom" th:value="${note.noteTP}"></td>
                                    <td><input type="number" name="noteExamen" min="0" max="20" step="0.01" class="form-control-custom" th:value="${note.noteExamen}"></td>
                                    <td><input type="number" name="noteRattrapage" min="0" max="20" step="0.01" class="form-control-custom" th:value="${note.noteRattrapage}"></td>
                                    <td class="d-flex gap-1">
                                        <button type="submit" class="btn btn-outline-primary btn-sm">Enregistrer</button>
                                        <a th:if="${note.id != null}" th:href="@{/scolarite/notes/supprimer/{id}(id=${note.id})}" class="btn btn-outline-danger btn-sm"
                                           th:attr="onclick=|return confirm('Supprimer cette note ?');|">Suppr.</a>
                                    </td>
                                </form>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer()}"></div>
</body>
</html>
