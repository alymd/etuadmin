<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header('Statistiques Étudiantes')}"></head>
<body>

<div class="app-container">
    <div th:replace="~{fragments :: sidebar('statistiques', 'ROLE_SCOLARITE')}"></div>

    <div class="main-content">
        <div th:replace="~{fragments :: navbar(${username}, 'ROLE_SCOLARITE')}"></div>

        <div class="content-wrapper animated-fade-in">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <a href="/scolarite/statistiques?niveau=L1" class="text-decoration-none">
                        <div class="glass-card p-4 text-center">
                            <h6 class="fw-semibold">Promotion L1</h6>
                            <p class="display-6 mb-0" th:text="${l1Count}">0</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="/scolarite/statistiques?niveau=L2" class="text-decoration-none">
                        <div class="glass-card p-4 text-center">
                            <h6 class="fw-semibold">Promotion L2</h6>
                            <p class="display-6 mb-0" th:text="${l2Count}">0</p>
                        </div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="/scolarite/statistiques?niveau=L3" class="text-decoration-none">
                        <div class="glass-card p-4 text-center">
                            <h6 class="fw-semibold">Promotion L3</h6>
                            <p class="display-6 mb-0" th:text="${l3Count}">0</p>
                        </div>
                    </a>
                </div>
            </div>

            <div class="glass-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold mb-0">Classement par moyenne générale</h5>
                    <a th:if="${niveau != null}" href="/scolarite/statistiques" class="btn btn-sm btn-outline-secondary">Toutes promotions</a>
                    <span th:if="${niveau != null}" class="badge bg-primary" th:text="'Promotion ' + ${niveau}">L1</span>
                </div>
                <div class="table-custom-wrapper">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Matricule</th>
                                <th>Étudiant</th>
                                <th>Promotion</th>
                                <th>Moyenne</th>
                                <th>Mention</th>
                                <th>Crédits</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item, stat : ${rankings}">
                                <td th:text="${stat.index + 1}">1</td>
                                <td th:text="${item.etudiant.matricule}">C00000</td>
                                <td th:text="${item.etudiant.utilisateur.prenom} + ' ' + ${item.etudiant.utilisateur.nom}">Nom</td>
                                <td th:text="${item.etudiant.niveau}">L1</td>
                                <td th:text="${#numbers.formatDecimal(item.moyenne, 1, 2)}">0.00</td>
                                <td><span class="badge bg-warning text-dark" th:text="${item.mention.libelle}">Mention</span></td>
                                <td th:text="${item.credits}">0</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(rankings)}">
                                <td colspan="7" class="text-center text-muted py-3">Aucun classement disponible.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer()}"></div>
</body>
</html>
