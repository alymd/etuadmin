<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - EduAdmin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-wrapper">

    <div class="login-card animated-fade-in">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 60px; height: 60px;">
                <i class="fa-solid fa-graduation-cap fa-2x"></i>
            </div>
            <h2 class="fw-bold mb-1">EduAdmin</h2>
            <p class="text-muted-light">Gestion Académique & Scolarité</p>
        </div>

        <!-- Notification d'erreur -->
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2" role="alert" style="border-radius: 8px; font-size: 0.9rem;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>Matricule ou mot de passe incorrect.</span>
        </div>

        <!-- Notification de déconnexion -->
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2" role="alert" style="border-radius: 8px; font-size: 0.9rem;">
            <i class="fa-solid fa-circle-check"></i>
            <span>Vous avez été déconnecté avec succès.</span>
        </div>

        <!-- Formulaire de connexion -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label text-white-50 fw-medium">Matricule / Identifiant</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark-light border-0 text-white-50"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="username" name="username" class="form-control bg-dark-light border-0 text-white" placeholder="Ex: admin ou C28916" required autofocus style="box-shadow: none;">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label text-white-50 fw-medium">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark-light border-0 text-white-50"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" name="password" class="form-control bg-dark-light border-0 text-white" placeholder="Entrez votre mot de passe" required style="box-shadow: none;">
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 py-2 d-flex align-items-center justify-content-center gap-2" style="font-weight: 600;">
                <i class="fa-solid fa-right-to-bracket"></i> Se connecter
            </button>
        </form>

        <div class="mt-4 text-center">
            <small class="text-white-50">© 2026 - Système d'Information Universitaire EduAdmin</small>
        </div>
    </div>

</body>
</html>
