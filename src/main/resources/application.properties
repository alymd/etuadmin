spring.application.name=eduadmin

# Configuration de la Base de Donnees MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/etuadmin-test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Proprietes JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuration Thymeleaf
spring.thymeleaf.cache=false

# Configuration de la Langue en Francais
spring.mvc.locale=fr
spring.mvc.locale-resolver=fixed

# Configuration de la Taille de Fichier pour les Reclamations (Max 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logs
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.com.eduadmin=DEBUG
